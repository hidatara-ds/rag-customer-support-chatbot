<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Coffee Support Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    :root { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto; }
    body { margin: 0; background: #0f172a; color: #e2e8f0; }
    .wrap { max-width: 920px; margin: 40px auto; padding: 16px; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 16px; padding: 16px; }
    h1 { font-size: 28px; margin: 0 0 12px; }
    .row { display: grid; grid-template-columns: 1fr 120px; gap: 10px; margin-top: 10px; }
    input, textarea, button, select {
      background: #0b1220; color: #e2e8f0; border: 1px solid #233a66; border-radius: 12px;
      padding: 10px 12px; outline: none;
    }
    button { cursor: pointer; }
    .chat { margin-top: 18px; display: grid; gap: 10px; }
    .msg { padding: 10px 12px; border-radius: 12px; }
    .user { background: #1e293b; justify-self: end; max-width: 80%; }
    .assistant { background: #0b1220; border: 1px solid #233a66; justify-self: start; max-width: 80%; }
    .badge { font-size: 12px; opacity: .8; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>☕ Coffee Support Chatbot</h1>
      <div class="row">
        <input id="user" placeholder="username (contoh: alice)" value="alice"/>
        <button id="presetOrder">Order Status</button>
      </div>
      <div class="row">
        <input id="msg" placeholder="Type your message... (e.g., Where is my order?)"/>
        <button id="send">Send</button>
      </div>
      <div style="margin-top:8px">
        <span class="badge">Tips: cobalah “Where is my order?”, “Apa kelebihan Latte?”, “Bagaimana klaim garansi?”</span>
      </div>
      <div id="chat" class="chat"></div>
    </div>
  </div>
  <script>
    const chat = document.getElementById('chat');
    const userEl = document.getElementById('user');
    const msgEl = document.getElementById('msg');
    const sendBtn = document.getElementById('send');
    const presetBtn = document.getElementById('presetOrder');

    function push(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
      const user = userEl.value.trim();
      const message = msgEl.value.trim();
      if (!user || !message) return;
      push('user', message);
      msgEl.value = '';
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type':'application/json' },
          body: JSON.stringify({ user, message })
        });
        const data = await res.json();
        push('assistant', data.answer || '(no answer)');
      } catch (e) {
        push('assistant', 'Error connecting to API.');
      }
    }

    sendBtn.onclick = send;
    msgEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
    presetBtn.onclick = () => { msgEl.value = 'Where is my order?'; msgEl.focus(); };
  </script>
</body>
</html>
